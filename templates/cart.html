{% extends "base.html" %}
{% block content %}

<h2>Your Cart</h2>

{% for item in cart %}
<p>{{ item.product }} - ₹{{ item.price }} × {{ item.qty }}</p>
{% endfor %}

<h3>Total: ₹{{ total }}</h3>

<!-- 🔥 PAYMENT BUTTON -->
<a href="/payment">
    <button style="background:green; color:white; padding:10px;">
        Proceed to Payment
    </button>
</a>

{% endblock %}
