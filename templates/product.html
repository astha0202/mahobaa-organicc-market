{% extends "base.html" %}
{% block content %}

<h2>Products</h2>

{% if products|length == 0 %}
<p>No products found</p>
{% endif %}

<div class="product-grid">
{% for p in products %}
<div class="card">

<img src="{{ p.image }}" width="120">

<h3>{{ p.name }}</h3>

<p>₹{{ p.price }}</p>

<p>{{ p.shop_name }}</p>

{% if p.price < 100 %}
<p style="color:red;">🔥 Best Price</p>
{% endif %}

<a href="/add_to_cart?product={{p.name}}&price={{p.price}}&qty=1">
<button>Add to Cart</button>
</a>

</div>
{% endfor %}
</div>

{% endblock %}
